<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Did United Win?</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.9.3/confetti.browser.min.js"></script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Fixtures ticker ─────────────────────────────────────────────── -->
  <div class="ticker-bar">
    <span class="ticker-label">NEXT FIXTURES</span>
    <div class="ticker-track">
      <div class="ticker-content" id="ticker-content">Loading…</div>
    </div>
  </div>

  <!-- ── Main ───────────────────────────────────────────────────────── -->
  <main>

    <div class="answer-wrap">
      <p class="eyebrow">Did Manchester United Win?</p>
      <h1 class="answer" id="answer">…</h1>
      <p class="subtitle" id="subtitle"></p>
    </div>

    <!-- Last match scorecard -->
    <section class="scorecard" id="scorecard" hidden>
      <div class="match-meta" id="match-meta"></div>
      <div class="scoreline" id="scoreline"></div>
      <div class="match-date" id="match-date"></div>
    </section>

    <!-- Previous results -->
    <section class="results-section" id="results-section" hidden>
      <div class="results-header">
        <span class="results-heading">Previous Results</span>
        <div class="filter-bar" id="filter-bar"></div>
      </div>
      <div class="results-list" id="results-list"></div>
    </section>

  </main>

  <!-- ── Footer ─────────────────────────────────────────────────────── -->
  <footer>
    Data via <a href="https://www.football-data.org" target="_blank" rel="noopener">football-data.org</a>
    &nbsp;·&nbsp; free tier — scores may be delayed
  </footer>

  <script src="app.js"></script>
</body>
</html>
