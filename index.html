<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Did Manchester United Win?</title>
    <style>
        body { font-family: sans-serif; background-color: #DA291C; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; }
        h1 { font-size: 2rem; font-weight: 400; margin-bottom: 0; }
        #answer { font-size: 8rem; font-weight: 900; margin: 0; line-height: 1; }
        #details { font-size: 1.5rem; margin-top: 1rem; opacity: 0.9; }
        .container { max-width: 600px; padding: 2rem; }
        .section-title { font-size: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 0.5rem; margin-top: 3rem; }
        .match-list { list-style: none; padding: 0; text-align: left; }
        .match-item { display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Did Manchester United win their last game?</h1>
        <div id="answer">LOADING</div>
        <div id="details">Fetching latest score...</div>
        <h2 class="section-title">Previous Results</h2>
        <ul class="match-list" id="previous-matches"></ul>
        <h2 class="section-title">Upcoming Fixtures</h2>
        <ul class="match-list" id="upcoming-matches"></ul>
    </div>
    <script src="app.js"></script>
</body>
</html>
